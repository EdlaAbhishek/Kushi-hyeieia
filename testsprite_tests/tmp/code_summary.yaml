version: "2"
type: frontend
tech_stack:
  - JavaScript
  - React (Vite)
  - Lucide React
  - Framer Motion
  - Tailwind CSS
  - Supabase
  - Gemini AI
routes:
  - path: /login
    file: src/pages/Login.jsx
    auth_required: false
    description: User login page
  - path: /signup
    file: src/pages/Signup.jsx
    auth_required: false
    description: User registration page
  - path: /
    file: src/pages/Home.jsx
    auth_required: true
    description: Home page
  - path: /about
    file: src/pages/About.jsx
    auth_required: true
    description: About page
  - path: /contact
    file: src/pages/Contact.jsx
    auth_required: true
    description: Contact page
  - path: /hospitals
    file: src/pages/Hospitals.jsx
    auth_required: true
    description: Hospitals search page
  - path: /emergency
    file: src/pages/Emergency.jsx
    auth_required: true
    description: Emergency SOS page
  - path: /profile
    file: src/pages/Profile.jsx
    auth_required: true
    description: User profile page
  - path: /chat
    file: src/pages/AiChat.jsx
    auth_required: true
    description: AI Healthcare Chatbot
  - path: /dashboard
    file: src/pages/Dashboard.jsx
    auth_required: true
    description: Patient dashboard
features:
  - name: User Authentication
    description: Secure login and signup for patients and doctors.
    files:
      - src/pages/Login.jsx
      - src/pages/Signup.jsx
      - src/services/AuthContext.jsx
    entry_route: /login
    user_interactions:
      - Fill email and password
      - Click Login/Signup
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Doctor Search
    description: Find doctors by specialization.
    files:
      - src/pages/Doctors.jsx
    entry_route: /doctors
    user_interactions:
      - Search by name or category
    auth_required: true
  - name: Emergency SOS
    description: Trigger emergency alerts and find nearest hospitals.
    files:
      - src/pages/Emergency.jsx
    entry_route: /emergency
    user_interactions:
      - Click SOS button
    auth_required: true
  - name: AI Assistant
    description: AI powered healthcare advisor using Gemini.
    files:
      - src/pages/AiChat.jsx
    entry_route: /chat
    user_interactions:
      - Type medical queries
    auth_required: true
known_limitations: []
