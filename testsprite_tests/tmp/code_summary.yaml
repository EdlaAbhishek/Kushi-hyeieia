version: "2"
type: frontend
tech_stack:
  - JavaScript
  - React
  - Vite
  - Supabase
  - Lucide React
  - Framer Motion
routes:
  - path: /login
    file: src/pages/Login.jsx
    auth_required: false
    description: User login page
  - path: /signup
    file: src/pages/Signup.jsx
    auth_required: false
    description: User registration page
  - path: /
    file: src/pages/Home.jsx
    auth_required: true
    description: Landng page for authenticated users
  - path: /dashboard
    file: src/pages/Dashboard.jsx
    auth_required: true
    description: Patient dashboard overview
  - path: /doctor-dashboard
    file: src/pages/DoctorDashboard.jsx
    auth_required: true
    description: Doctor workbench and dashboard
  - path: /chat
    file: src/pages/AiChat.jsx
    auth_required: true
    description: AI health assistant chat
  - path: /services
    file: src/pages/Services.jsx
    auth_required: true
    description: Health services including prescription scanning
  - path: /dashboard/symptom-checker
    file: src/pages/SymptomChecker.jsx
    auth_required: true
    description: AI-powered symptom analysis
features:
  - name: Prescription Scanning
    description: Scan medical prescriptions using AI to extract medicine names and instructions.
    files:
      - src/pages/Services.jsx
      - api/analyze-prescription.js
    entry_route: /services
    user_interactions:
      - Upload a prescription image
      - Wait for AI analysis results
      - View extracted medicine list and instructions
    api_calls:
      - method: POST
        endpoint: /api/analyze-prescription
    auth_required: true
  - name: AI Health Chat
    description: Conversational AI assistant for health queries.
    files:
      - src/pages/AiChat.jsx
      - api/gemini-chat.js
    entry_route: /chat
    user_interactions:
      - Type health question in chat box
      - Send message and wait for AI response
    api_calls:
      - method: POST
        endpoint: /api/gemini-chat
    auth_required: true
  - name: Symptom Checker
    description: Guided AI diagnosis for reported symptoms.
    files:
      - src/pages/SymptomChecker.jsx
      - api/gemini-symptom.js
    entry_route: /dashboard/symptom-checker
    user_interactions:
      - Enter primary symptom
      - Answer AI follow-up questions
      - Review potential conditions and advice
    api_calls:
      - method: POST
        endpoint: /api/gemini-symptom
    auth_required: true
known_limitations: []
